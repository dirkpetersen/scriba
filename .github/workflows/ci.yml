name: CI

# Windows-only project (CLAUDE.md locked decision; pyproject.toml's
# `[tool.uv] environments = ["sys_platform == 'win32'"]` means a Linux
# runner can't even resolve the lockfile), so every job below runs on
# windows-latest.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for PR-triggered runs (found in review) -- neither
# job needs to write anything.
permissions:
  contents: read

# Cancel a still-running CI for an older push once a newer one lands on the
# same branch/PR, instead of stacking redundant Windows runs (found in
# review) -- this matters more than usual here since cpu-stt-smoke downloads
# a model on every uncached run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-unit:
    name: Lint + unit tests (CPU, no hardware)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      # `uv sync` installs the `dev` dependency-group implicitly (uv treats
      # it as a default group) -- `--group dev` is passed anyway to make the
      # intent explicit in CI rather than relying on that default staying
      # true. Verified locally: bare `uv sync` and `uv sync --group dev`
      # install identical package sets.
      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Lint (ruff)
        run: uv run ruff check .

      # pyproject.toml's [tool.pytest.ini_options] addopts already excludes
      # both `gpu`- and `cpu_stt`-marked tests by default (`-m "not gpu and
      # not cpu_stt"`), so this needs no extra flags and requires no network
      # beyond the `uv sync` above.
      - name: Unit tests
        run: uv run pytest -q

  cpu-stt-smoke:
    name: CPU STT smoke test (real faster-whisper, tiny model)
    runs-on: windows-latest
    # Redirect LOCALAPPDATA for this job only, so the model cache below has a
    # workspace-relative, predictable path to key on (scriba.config.models_dir()
    # resolves to %LOCALAPPDATA%\Scriba\models at runtime).
    env:
      LOCALAPPDATA: ${{ github.workspace }}\appdata-local
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2

      - name: Install dependencies
        run: uv sync --locked --group dev

      # Best-effort cache of the ~75 MB tiny model across runs; a cache miss
      # just means this job re-downloads it from Hugging Face, still fine.
      - name: Cache Whisper tiny model
        uses: actions/cache@v4
        with:
          path: ${{ env.LOCALAPPDATA }}\Scriba\models\tiny
          key: whisper-tiny-model-v1

      # tests/test_cpu_stt_smoke.py exercises WhisperLocalBackend.load() ->
      # .transcribe() end-to-end on CPU with the `tiny` model (device="cpu",
      # compute_type="int8") -- the real faster-whisper/CTranslate2 path that
      # was previously only covered by @pytest.mark.gpu tests (excluded by
      # default, so effectively never run in CI). `-m cpu_stt` overrides the
      # `-m "not gpu and not cpu_stt"` in addopts to select just this test;
      # this is the one job in this workflow that needs network access
      # beyond package installation (to fetch the model).
      - name: CPU STT smoke test
        run: uv run pytest -q -m cpu_stt
